name: 'Setup MicroCeph'
description: 'Set up a single-node MicroCeph cluster with RGW (S3 API) for use in GitHub Actions workflows'

inputs:
  channel:
    description: 'MicroCeph snap channel'
    default: 'squid/stable'
  accesskey:
    description: 'S3 access key for the test user'
    default: 'vitess'
  secretkey:
    description: 'S3 secret key for the test user'
    default: 'vitess-secret-key'
  bucket:
    description: 'S3 bucket name'
    default: 'vitess-test'
  osdsize:
    description: 'Size of each loopback OSD disk'
    default: '4G'

outputs:
  s3config:
    description: |
      Path to a sourceable config file. Source it to get:
        AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY,
        AWS_ENDPOINT, AWS_BUCKET, AWS_REGION
    value: ${{ steps.microceph-output.outputs.s3-config-file }}

runs:
  using: 'composite'
  steps:
    - name: Cache MicroCeph snap
      id: cache-microceph
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: microceph-snap-cache
        key: microceph-${{ inputs.channel }}-${{ runner.os }}-v2

    - name: Get MicroCeph snap (on cache miss)
      if: steps.cache-microceph.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        mkdir -p microceph-snap-cache
        cd microceph-snap-cache
        snap download microceph --channel=${{ inputs.channel }}

    - name: Bootstrap MicroCeph S3
      id: microceph-config
      shell: bash
      run: ${{ github.action_path }}/microceph.sh \
        -c ${{ inputs.channel }} \
        -a ${{ inputs.accesskey }} \
        -s ${{ inputs.secretkey }} \
        -b ${{ inputs.bucket }} \
        -z ${{ inputs.osdsize }}

    - id: microceph-output
      shell: bash
      run: echo "s3-config-file=$(pwd)/microceph.source" >> "$GITHUB_OUTPUT"
