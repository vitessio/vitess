name: 'Setup MySQL'
description: 'Set up MySQL server for use in GitHub Actions workflows'
inputs:
  flavor:
    description: 'The flavor of MySQL to use (e.g. mysql-5.7, mysql-8.0, mysql-8.4)'
    required: true
runs:
  using: "composite"
  steps:
    - name: Setup MySQL
      shell: bash -e {0}
      run: |
        export DEBIAN_FRONTEND="noninteractive"

        # archive.ubuntu.com resolves to multiple IP addresses, and some of
        # them intermittently do not respond to HTTPS requests, so a plain
        # curl/wget call can fail even though the archive is healthy. Resolve
        # the host ourselves and try each IPv4 address in turn.
        download_with_ip_failover() {
          local url="$1"
          local out="$2"
          local host ips ip
          host="$(echo "$url" | awk -F/ '{print $3}')"

          mapfile -t ips < <(getent ahostsv4 "$host" | awk '{print $1}' | sort -u)
          echo "Resolved IPs for $host: ${ips[*]}"

          for ip in "${ips[@]}"; do
            echo "Trying $host via $ip ..."
            if curl -fsSL --connect-timeout 10 --max-time 30 --retry 2 --retry-delay 2 --resolve "$host:443:$ip" -o "$out" "$url"; then
              echo "Succeeded via $ip"
              return 0
            fi
          done

          echo "All resolved IPs for $host failed"
          return 1
        }

        sudo apt-get update

        # Uninstall any previously installed MySQL first
        # sudo systemctl stop apparmor
        sudo DEBIAN_FRONTEND="noninteractive" apt-get remove -y --purge mysql-server mysql-client mysql-common
        sudo apt-get -y autoremove
        sudo apt-get -y autoclean
        # sudo deluser mysql
        sudo rm -rf /var/lib/mysql
        sudo rm -rf /etc/mysql

        if [[ "$(dpkg --print-architecture)" == "arm64" ]]; then
          # Oracle's apt repo only publishes amd64 packages for Ubuntu, so on
          # arm64 we install MySQL from the Ubuntu archive instead, which only
          # ships MySQL 8.0.
          if [[ "${{ inputs.flavor }}" != "mysql-8.0" ]]; then
            echo "Unsupported MySQL flavor on arm64: ${{ inputs.flavor }}"
            exit 1
          fi
          sudo DEBIAN_FRONTEND="noninteractive" apt-get install -y mysql-server mysql-client
        else
          # We have to install this old version of libaio1. See also:
          # https://bugs.launchpad.net/ubuntu/+source/libaio/+bug/2067501
          # Note: these commands must stay separate statements: `set -e` does
          # not fire for failures inside a `&&` chain, and the install must
          # fail right here rather than in a later, unrelated apt-get run.
          download_with_ip_failover \
            https://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/libaio1_0.3.112-13build1_amd64.deb \
            libaio1_0.3.112-13build1_amd64.deb || {
            echo "Failed to download libaio1. The pinned version may have been superseded and removed from archive.ubuntu.com; check https://archive.ubuntu.com/ubuntu/pool/main/liba/libaio/ for the current version."
            exit 1
          }
          echo "2dcfe0b49d7cccfbf1bd6a3f627cf44bea9f51fb32f7e0e552a0df75698e0d27  libaio1_0.3.112-13build1_amd64.deb" | sha256sum --check
          sudo dpkg -i libaio1_0.3.112-13build1_amd64.deb
          rm libaio1_0.3.112-13build1_amd64.deb

          # Get key to latest MySQL repo
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys A8D3785C
          wget -c https://dev.mysql.com/get/mysql-apt-config_0.8.35-1_all.deb

          if [[ "${{ inputs.flavor }}" == "mysql-5.7" ]]; then
            # Bionic packages are still compatible for Jammy since there's no MySQL 5.7
            # packages for Jammy.
            echo mysql-apt-config mysql-apt-config/repo-codename select bionic | sudo debconf-set-selections
            echo mysql-apt-config mysql-apt-config/select-server select mysql-5.7 | sudo debconf-set-selections
            sudo DEBIAN_FRONTEND="noninteractive" dpkg -i mysql-apt-config*
            sudo apt-get update
            # libtinfo5 is also needed for older MySQL 5.7 builds. Separate
            # statements for the same fail-fast reason as libaio1 above.
            download_with_ip_failover \
              https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/libtinfo5_6.3-2ubuntu0.2_amd64.deb \
              libtinfo5_6.3-2ubuntu0.2_amd64.deb || {
              echo "Failed to download libtinfo5. The pinned version may have been superseded and removed from archive.ubuntu.com; check https://archive.ubuntu.com/ubuntu/pool/universe/n/ncurses/ for the current version."
              exit 1
            }
            echo "b9bb64e716a7d9de05b1b33992763142ca81bcae3a7f8ce7e29fa3c6fd32f1e8  libtinfo5_6.3-2ubuntu0.2_amd64.deb" | sha256sum --check
            sudo dpkg -i libtinfo5_6.3-2ubuntu0.2_amd64.deb
            rm libtinfo5_6.3-2ubuntu0.2_amd64.deb
            sudo DEBIAN_FRONTEND="noninteractive" apt-get install -y mysql-client=5.7* mysql-community-server=5.7* mysql-server=5.7* libncurses6
          elif [[ "${{ inputs.flavor }}" == "mysql-8.0" ]]; then
            echo mysql-apt-config mysql-apt-config/select-server select mysql-8.0 | sudo debconf-set-selections
            sudo DEBIAN_FRONTEND="noninteractive" dpkg -i mysql-apt-config*
            sudo apt-get update
            sudo DEBIAN_FRONTEND="noninteractive" apt-get install -y mysql-server mysql-client
          elif [[ "${{ inputs.flavor }}" == "mysql-8.4" ]]; then
            echo mysql-apt-config mysql-apt-config/select-server select mysql-8.4-lts | sudo debconf-set-selections
            sudo DEBIAN_FRONTEND="noninteractive" dpkg -i mysql-apt-config*
            sudo apt-get update
            sudo DEBIAN_FRONTEND="noninteractive" apt-get install -y mysql-server mysql-client
          else
            echo "Unsupported MySQL flavor: ${{ inputs.flavor }}"
            exit 1
          fi
        fi

        sudo service mysql stop
        sudo bash -c "echo '/usr/sbin/mysqld { }' > /etc/apparmor.d/usr.sbin.mysqld" # https://bugs.launchpad.net/ubuntu/+source/mariadb-10.1/+bug/1806263
        sudo ln -s /etc/apparmor.d/usr.sbin.mysqld /etc/apparmor.d/disable/
        sudo apparmor_parser -R /etc/apparmor.d/usr.sbin.mysqld || echo "could not remove mysqld profile"
