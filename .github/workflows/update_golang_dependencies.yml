name: Update Golang Dependencies

on:
  schedule:
    - cron: "0 0 1,15 * *" # Runs every month on the 1st and 15th days at midnight UTC
  workflow_dispatch:

permissions: read-all

jobs:
  update_golang_deps:
    if: github.repository == 'vitessio/vitess'
    permissions:
      contents: write
      pull-requests: write
    name: Update Golang Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write
          permission-members: read

      - name: Get GitHub App User ID
        id: get-user-id
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: 'false'

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

      - name: Upgrade the Golang Dependencies
        id: detect-and-update
        run: |
          # Upgrade the root module and every tool module under tools/.
          modules="."
          for f in tools/*/go.mod; do
            modules="${modules} $(dirname "${f}")"
          done

          for mod in ${modules}; do
            (cd "${mod}" && go get -u ./...)
          done

          output=$(git status -s)
          if [ -z "${output}" ]; then
            exit 0
          fi

          for mod in ${modules}; do
            (cd "${mod}" && go mod tidy)
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          committer: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"
          author: "${{ steps.app-token.outputs.app-slug }}[bot] <${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com>"
          branch: "upgrade-go-deps-on-main"
          commit-message: "upgrade go deps"
          signoff: true
          delete-branch: true
          team-reviewers: Release
          title: "Upgrade the Golang Dependencies"
          body: |
            This Pull Request updates all the Golang dependencies to their latest version using `go get -u ./...`, both for the root module and for the tool modules under `tools/`.

            cc @vitessio/release
          base: main
          labels: |
            go
            Component: General
            Type: Dependencies
