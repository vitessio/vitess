name: Update Golang Dependencies

on:
  schedule:
    - cron: "0 0 1,15 * *" # Runs every month on the 1st and 15th days at midnight UTC
  workflow_dispatch:

permissions: read-all

jobs:
  update_golang_deps:
    if: github.repository == 'vitessio/vitess'
    permissions:
      contents: write
      pull-requests: write
    name: Update Golang Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          persist-credentials: 'false'

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

      - name: Upgrade the Golang Dependencies
        id: detect-and-update
        run: |
          go get -u ./...

          output=$(git status -s)
          if [ -z "${output}" ]; then
            exit 0
          fi

          go mod tidy

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.CREATE_PR_VITESS_BOT }}
          branch: "upgrade-go-deps-on-main"
          commit-message: "upgrade go deps"
          signoff: true
          delete-branch: true
          team-reviewers: Release
          title: "Upgrade the Golang Dependencies"
          body: |
            This Pull Request updates all the Golang dependencies to their latest version using `go get -u ./...`.
            
            cc @vitessio/release
          base: main
          labels: |
            go
            Component: General
            Type: Dependencies
