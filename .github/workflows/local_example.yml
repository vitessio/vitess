name: local_example
on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: '**'
  pull_request:
    branches: '**'
permissions: read-all

env:
  BOOTSTRAP_VERSION: "ci"
  BOOTSTRAP_FLAVOR: "mysql84"

jobs:

  build:
    name: Local example using ${{ matrix.topo }} on Ubuntu
    runs-on: ${{ github.repository == 'vitessio/vitess' && 'oracle-vm-16cpu-64gb-x86-64' || 'ubuntu-24.04' }}
    strategy:
      matrix:
        topo: [etcd, zk2]

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
      with:
        egress-policy: audit

    - name: Skip CI
      run: |
        if [[ "${{contains( github.event.pull_request.labels.*.name, 'Skip CI')}}" == "true" ]]; then
          echo "skipping CI due to the 'Skip CI' label"
          exit 1
        fi

    - name: Check out code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: 'false'

    - name: Check for changes in relevant files
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: changes
      with:
        token: ''
        filters: |
          examples:
            - 'test/config.json'
            - 'go/**/*.go'
            - 'test.go'
            - 'Makefile'
            - 'build.env'
            - 'go.sum'
            - 'go.mod'
            - 'proto/*.proto'
            - 'tools/**'
            - 'config/**'
            - 'bootstrap.sh'
            - 'examples/**'
            - '.github/workflows/local_example.yml'

    - name: Build bootstrap images
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 15
      uses: ./.github/actions/build-bootstrap

    - name: Set up Go
      if: steps.changes.outputs.examples == 'true'
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

    - name: Tune the OS
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 5
      uses: ./.github/actions/tune-os

    - name: Get dependencies
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 5
      run: |
        go mod download

    - name: Run make minimaltools
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 5
      run: |
        make minimaltools

    - name: Build
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 10
      run: |
        make build

    - name: local_example
      if: steps.changes.outputs.examples == 'true'
      timeout-minutes: 30
      run: |
        export TOPO=${{matrix.topo}}
        if [ "${{matrix.os}}" = "macos-latest" ]; then
          export PATH="/usr/local/opt/mysql@5.7/bin:$PATH"
        fi
        go run test.go -print-log -follow -pull=false -flavor=${{ env.BOOTSTRAP_FLAVOR }} -bootstrap-version=${{ env.BOOTSTRAP_VERSION }} local_example
