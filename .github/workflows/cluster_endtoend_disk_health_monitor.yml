name: Cluster End-to-End Tests (tabletmanager_disk_health_monitor)

on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: "**"
  pull_request:
    branches: "**"

concurrency:
  group: format('{0}-{1}', ${{ github.ref }}, 'Cluster End-to-End Tests (tabletmanager_disk_health_monitor)')
  cancel-in-progress: true

permissions: read-all

env:
  LAUNCHABLE_ORGANIZATION: "vitess"
  LAUNCHABLE_WORKSPACE: "vitess-app"
  GITHUB_PR_HEAD_SHA: "${{ github.event.pull_request.head.sha }}"

jobs:
  test:
    name: Run endtoend tests on Cluster (tabletmanager_disk_health_monitor)
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Skip CI
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'Skip CI') }}" == "true" ]]; then
            echo "skipping CI due to the 'Skip CI' label"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"

      - name: Check for changes in relevant files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          token: ""
          filters: |
            end_to_end:
              - 'go/vt/vttablet/tabletserver/**'
              - 'go/test/endtoend/cluster/**'
              - 'go/test/endtoend/tabletmanager/disk_health_monitor/**'
              - 'test/config.json'
              - 'test.go'
              - 'Makefile'
              - 'build.env'
              - 'go.sum'
              - 'go.mod'
              - 'tools/**'
              - 'config/**'
              - 'bootstrap.sh'
              - '.github/workflows/cluster_endtoend_disk_health_monitor.yml'
              - '.github/actions/setup-mysql/action.yml'

      - name: Set up Go
        if: steps.changes.outputs.end_to_end == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

      - name: Set up python
        if: steps.changes.outputs.end_to_end == 'true'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0

      - name: Tune the OS
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 5
        uses: ./.github/actions/tune-os

      - name: Setup MySQL
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 8
        uses: ./.github/actions/setup-mysql
        with:
          flavor: mysql-8.4

      - name: Get dependencies
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 10
        run: |
          sudo apt-get -qq install -y mysql-shell
          sudo apt-get -qq install -y make unzip g++ etcd-client etcd-server curl git wget xz-utils libncurses6 fuse3
          sudo service etcd stop
          go mod download

      - name: Setup launchable dependencies
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          steps.changes.outputs.end_to_end == 'true' &&
          github.base_ref == 'main'
        run: |
          pip3 install --user launchable~=1.0 > /dev/null
          launchable verify || true
          launchable record build --name "$GITHUB_RUN_ID" --no-commit-collection --source .

      - name: Run cluster endtoend test
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 45
        run: |
          export VTDATAROOT="/tmp/"
          source build.env
          set -exo pipefail

          go run test.go -docker=false -follow -shard tabletmanager_disk_health_monitor

      - name: Record test results in launchable
        if: |
          github.event_name == 'pull_request' &&
          github.event.pull_request.draft == false &&
          steps.changes.outputs.end_to_end == 'true' &&
          github.base_ref == 'main' &&
          !cancelled()
        run: |
          launchable record tests --build "$GITHUB_RUN_ID" go-test . || true

      - name: Test Summary
        if: steps.changes.outputs.end_to_end == 'true' && failure()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2.6
        with:
          paths: "_test/junit/*.xml"
