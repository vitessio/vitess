name: Vitesst End-to-End Tests

on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: "**"
  pull_request:
    branches: "**"

concurrency:
  group: format('{0}-{1}', ${{ github.ref }}, 'Vitesst End-to-End Tests')
  cancel-in-progress: true

permissions: read-all

env:
  GITHUB_PR_HEAD_SHA: "${{ github.event.pull_request.head.sha }}"

jobs:
  build-images:
    name: Build vitesst images
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    outputs:
      changed: ${{ steps.changes.outputs.end_to_end }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Skip CI
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'Skip CI') }}" == "true" ]]; then
            echo "skipping CI due to the 'Skip CI' label"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      - name: Check for changes in relevant files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          token: ""
          filters: |
            end_to_end:
              - 'go/**/*.go'
              - 'go/vt/sidecardb/**/*.sql'
              - 'go/test/vitesst/**'
              - 'Makefile'
              - 'build.env'
              - 'go.sum'
              - 'go.mod'
              - 'proto/*.proto'
              - 'tools/**'
              - 'config/**'
              - 'docker/utils/install_dependencies.sh'
              - '.github/workflows/vitesst_endtoend.yml'

      - name: Set up Docker Buildx
        if: steps.changes.outputs.end_to_end == 'true'
        uses: docker/setup-buildx-action@8d2750c60ea24b2b1cbcdd0c2b71dbf0a01b3d55 # v3.12.0

      # The binaries are compiled in the Dockerfile's builder stage and copied
      # into the image as its last layer, so the MySQL layers stay cached
      # across source changes.
      - name: Build vitesst images
        if: steps.changes.outputs.end_to_end == 'true'
        run: |
          docker buildx bake --load -f go/vitesst/docker-bake.hcl \
            --set '*.platform=linux/amd64' \
            --set '*.cache-from=type=gha,scope=vitesst' \
            --set '*.cache-to=type=gha,mode=max,scope=vitesst'
          docker save vitesst:mysql80 vitesst:mysql84 | zstd -T0 -3 > vitesst-images.tar.zst

      - name: Upload vitesst images
        if: steps.changes.outputs.end_to_end == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vitesst-images
          path: vitesst-images.tar.zst
          retention-days: 1

  generate-matrix:
    name: Generate test matrix
    needs: build-images
    if: needs.build-images.outputs.changed == 'true'
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      # Every verified package carries its CI bin in the migration manifest,
      # so the matrix is one job per bin.
      - name: Generate matrix from the migration manifest
        id: set-matrix
        run: |
          matrix=$(jq -c '
            .packages
            | map(select(.status == "verified"))
            | group_by(.ci_shard)
            | map({
                bin: .[0].ci_shard,
                packages: (map(.pkg) | join(" ")),
                image: (if any(.[]; .verify_cmd | test("debug2pc")) then "vitesst:mysql84-debug2pc" else "" end)
              })
          ' go/test/vitesst/migration/manifest.json)
          echo "matrix={\"include\":$matrix}" >> $GITHUB_OUTPUT

  test:
    name: Run vitesst tests (${{ matrix.bin }})
    needs: [build-images, generate-matrix]
    if: needs.generate-matrix.outputs.matrix != ''
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    runs-on: ubuntu-24.04

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod

      - name: Download vitesst images
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: vitesst-images

      - name: Load vitesst images
        run: zstd -dc vitesst-images.tar.zst | docker load

      # The tests need no host MySQL, no Percona apt repositories, and no
      # bootstrap: every component runs from the images loaded above.
      - name: Run tests
        env:
          VITESST_IMAGE: ${{ matrix.image }}
          VITESST_ARTIFACTS: ${{ github.workspace }}/vitesst-artifacts
        run: |
          go test -count=1 -timeout 50m -v ${{ matrix.packages }}

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vitesst-artifacts-${{ matrix.bin }}
          path: vitesst-artifacts
          retention-days: 7
