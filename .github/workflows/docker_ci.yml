name: docker_ci
on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: "**"
  pull_request:
    branches: "**"
permissions: read-all

env:
  BOOTSTRAP_VERSION: "ci"
  BOOTSTRAP_FLAVOR: "mysql84"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: java
            name: Java Docker Test
          - shard: docker_cluster
            name: Docker Test Cluster

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Skip CI
        run: |
          if [[ "${{contains( github.event.pull_request.labels.*.name, 'Skip CI')}}" == "true" ]]; then
            echo "skipping CI due to the 'Skip CI' label"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: "false"

      - name: Check for changes in relevant files
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          token: ""
          filters: |
            end_to_end:
              - 'test/config.json'
              - 'go/**/!(*_test).go'
              - 'go/**/*.s'
              - 'go/test/endtoend/**'
              - 'go/vt/sidecardb/**/*.sql'
              - 'go/mysql/collations/colldata/**'
              - 'go/mysql/icuregex/internal/icudata/**'
              - 'test.go'
              - 'Makefile'
              - 'build.env'
              - 'go.sum'
              - 'go.mod'
              - 'proto/*.proto'
              - 'tools/**'
              - 'config/**'
              - 'bootstrap.sh'
              - 'docker/**'
              - 'java/**'
              - '.github/workflows/docker_ci.yml'

      - name: Build bootstrap images
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 20
        uses: ./.github/actions/build-bootstrap
        with:
          bootstrap-version: ${{ env.BOOTSTRAP_VERSION }}
          bootstrap-flavor: ${{ env.BOOTSTRAP_FLAVOR }}

      - name: Set up Go
        if: steps.changes.outputs.end_to_end == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

      - name: Tune the OS
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 5
        uses: ./.github/actions/tune-os

      - name: Run docker tests - ${{ matrix.shard }}
        if: steps.changes.outputs.end_to_end == 'true'
        timeout-minutes: 30
        run: |
          go run test.go -docker=true -pull=false -flavor=${{ env.BOOTSTRAP_FLAVOR }} -bootstrap-version=${{ env.BOOTSTRAP_VERSION }} --follow -shard ${{ matrix.shard }}
