name: docker_ci
on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: "**"
  pull_request:
    branches: "**"
permissions: read-all

env:
  BOOTSTRAP_VERSION: "ci"
  BOOTSTRAP_FLAVOR: "mysql84"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: java
            name: Java Docker Test
          - shard: docker_cluster
            name: Docker Test Cluster

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Skip CI
        run: |
          if [[ "${{contains( github.event.pull_request.labels.*.name, 'Skip CI')}}" == "true" ]]; then
            echo "skipping CI due to the 'Skip CI' label"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      - name: Check for changes in relevant files
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          token: ""
          filters: |
            end_to_end:
              - 'test/config.json'
              - 'go/**/*.go'
              - 'test.go'
              - 'Makefile'
              - 'build.env'
              - 'go.sum'
              - 'go.mod'
              - 'proto/*.proto'
              - 'tools/**'
              - 'config/**'
              - 'bootstrap.sh'
              - 'docker/**'
              - 'java/**'
              - '.github/workflows/docker_ci.yml'

      - name: Build bootstrap images
        if: steps.changes.outputs.end_to_end == 'true'
        uses: ./.github/actions/build-bootstrap
        with:
          bootstrap-version: ${{ env.BOOTSTRAP_VERSION }}
          bootstrap-flavor: ${{ env.BOOTSTRAP_FLAVOR }}

      - name: Set up Go
        if: steps.changes.outputs.end_to_end == 'true'
        uses: ./.github/actions/setup-go
        with:
          cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

      - name: Tune the OS
        if: steps.changes.outputs.end_to_end == 'true'
        uses: ./.github/actions/tune-os

      - name: Run docker tests - ${{ matrix.shard }}
        if: steps.changes.outputs.end_to_end == 'true'
        run: |
          go run test.go -docker=true -pull=false -flavor=${{ env.BOOTSTRAP_FLAVOR }} -bootstrap-version=${{ env.BOOTSTRAP_VERSION }} --follow -shard ${{ matrix.shard }}
