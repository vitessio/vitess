name: Docker Lite Build Check

on:
  pull_request:
    branches: '**'
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"

permissions: read-all

jobs:
  generate-matrix:
    name: Generate matrix
    runs-on: ubuntu-24.04
    outputs:
      dockerfiles: ${{ steps.generate-matrix.outputs.dockerfiles }}
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Generate matrix
        id: generate-matrix
        run: |
          dockerfiles=$(ls docker/lite/Dockerfile* | jq -Rnc '[inputs]')
          echo "dockerfiles=${dockerfiles}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.dockerfile }}
    runs-on: ubuntu-24.04
    needs: generate-matrix

    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.generate-matrix.outputs.dockerfiles) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Skip CI
        run: |
          if [[ "${{contains( github.event.pull_request.labels.*.name, 'Skip CI')}}" == "true" ]]; then
            echo "skipping CI due to the 'Skip CI' label"
            exit 1
          fi

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: 'false'

      - name: Build lite image
        timeout-minutes: 15
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.dockerfile }}
      cancel-in-progress: true
