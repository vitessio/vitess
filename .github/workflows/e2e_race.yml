name: e2e_race
on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
    tags: '**'
  pull_request:
    branches: '**'
permissions: read-all
jobs:

  build:
    name: End-to-End Test (Race)
    runs-on: ubuntu-24.04
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
      with:
        egress-policy: audit

    - name: Skip CI
      run: |
        if [[ "${{contains( github.event.pull_request.labels.*.name, 'Skip CI')}}" == "true" ]]; then
          echo "skipping CI due to the 'Skip CI' label"
          exit 1
        fi

    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        persist-credentials: 'false'

    - name: Check for changes in relevant files
      uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
      id: changes
      with:
        token: ''
        filters: |
          end_to_end:
            - 'go/**/!(*_test).go'
            - 'go/**/*.s'
            # Package-level endtoend suites (go/mysql/endtoend, go/vt/vtgate/endtoend, ...).
            # The cluster test tree go/test/endtoend is excluded: its packages are not run
            # here, and its non-test .go helpers already match the first pattern.
            - 'go/!(test)/**/endtoend/**'
            - 'go/vt/sidecardb/**/*.sql'
            - 'go/mysql/collations/colldata/**'
            - 'go/mysql/icuregex/internal/icudata/**'
            - 'test.go'
            - 'Makefile'
            - 'build.env'
            - 'go.sum'
            - 'go.mod'
            - 'proto/*.proto'
            - 'tools/**'
            - 'config/**'
            - 'bootstrap.sh'
            - '.github/workflows/e2e_race.yml'
            - '.github/actions/setup-mysql/action.yml'

    - name: Set up Go
      if: steps.changes.outputs.end_to_end == 'true'
      uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
      with:
        go-version-file: go.mod
        cache: ${{ (github.base_ref == 'main' || (github.base_ref == '' && github.ref_name == 'main')) && 'true' || 'false' }}

    - name: Tune the OS
      if: steps.changes.outputs.end_to_end == 'true'
      timeout-minutes: 5
      uses: ./.github/actions/tune-os

    - name: Setup MySQL
      if: steps.changes.outputs.end_to_end == 'true'
      timeout-minutes: 8
      uses: ./.github/actions/setup-mysql
      with:
        flavor: mysql-8.4

    - name: Get dependencies
      if: steps.changes.outputs.end_to_end == 'true'
      timeout-minutes: 5
      run: |
        sudo apt-get update
        
        # Install everything else we need, and configure
        sudo apt-get install -y make unzip g++ etcd-client etcd-server curl git wget xz-utils
        
        sudo service etcd stop

        go mod download

    - name: Run make minimaltools
      if: steps.changes.outputs.end_to_end == 'true'
      timeout-minutes: 5
      run: |
        make minimaltools

    - name: e2e_race
      if: steps.changes.outputs.end_to_end == 'true'
      timeout-minutes: 30
      run: |
        NOVTADMINBUILD=1 make e2e_test_race
