name: e2e

on:
  push:
    branches:
      - "main"
      - "release-[0-9]+.[0-9]"
  pull_request:
    branches: "**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

env:
  EXCLUDE_PACKAGES: |
    vitess.io/vitess/go/test/endtoend/binlogdump
    vitess.io/vitess/go/test/endtoend/transaction/twopc/fuzz
    vitess.io/vitess/go/test/endtoend/docker
    vitess.io/vitess/go/test/endtoend/vtcombo
    vitess.io/vitess/go/test/endtoend/vtcombo/recreate
    vitess.io/vitess/go/test/endtoend/utils
    vitess.io/vitess/go/test/endtoend/transaction/twopc
    vitess.io/vitess/go/test/endtoend/transaction/twopc/metric

  PARTITIONS: 64

jobs:
  generate-matrix:
    name: Generate shard matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          go-version-file: go.mod

      - name: Download timing data from the latest main run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow e2e.yaml --branch main \
            --status success --limit 1 --json databaseId -q '.[0].databaseId' || true)
          if [[ -n "$run_id" ]]; then
            gh run download --repo "$GITHUB_REPOSITORY" "$run_id" --pattern 'e2e-timing-*' --dir timing || true
          fi

      - name: Generate shard matrix
        id: matrix
        run: |
          set -o pipefail
          matrix=$(go list ./go/test/endtoend/... \
            | grep -vFx -f <(printf '%s' "$EXCLUDE_PACKAGES") \
            | go tool -modfile=tools/gotestsum/go.mod gotestsum tool ci-matrix \
                --partitions "$PARTITIONS" --timing-files './timing/**/*.log')
          echo "matrix=$(jq -c '.include |= map(
            (. + {race: false}),
            (. + {race: true, id: "\(.id)-race", description: "\(.description) (race)"})
          )' <<<"$matrix")" >> "$GITHUB_OUTPUT"

  test:
    name: ${{ matrix.description }}
    needs: generate-matrix
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: "false"

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0 # zizmor: ignore[cache-poisoning]
        with:
          go-version-file: go.mod

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c60ea24b2b1cbcdd0c2b71dbf0a01b3d55 # v3.12.0

      - name: Run tests
        env:
          PKG: ${{ matrix.packages }}
          RACE_FLAG: ${{ matrix.race && '-race' || '' }}
        run: |
          set -o pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          make -s NOBANNER=1 e2e PKG="$PKG" \
            BAKE_ARGS='--set *.platform=linux/amd64 --set *.cache-from=type=gha,scope=vitesst --set *.cache-to=type=gha,mode=max,scope=vitesst' \
            GOTEST_FLAGS="-json $RACE_FLAG -artifacts -outputdir $GITHUB_WORKSPACE/artifacts" \
            | go tool -modfile=tools/gotestsum/go.mod gotestsum \
                --raw-command --format github-actions --jsonfile timing.log -- cat

      - name: Upload timing data
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !matrix.race
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-timing-${{ matrix.id }}
          path: timing.log
          retention-days: 7

      - name: Keep only failed test artifacts
        if: failure()
        run: |
          keep=$(jq -rs '
            def key: .Package + "/" + .Test;
            map(select(.Test != null)) as $tests
            | ($tests | map(select(.Action == "run") | key)) as $started
            | ($tests | map(select(.Action == "pass" or .Action == "skip") | key)) as $done
            | ($started - $done) as $keep
            | $tests[]
            | select(.Action == "artifacts" and (key as $k | $keep | index($k)))
            | .Path + "\t" + (key | gsub("[^A-Za-z0-9._-]+"; "_"))
          ' timing.log) || exit 0
          [[ -n "$keep" ]] || exit 0
          mkdir -p failed-artifacts
          while IFS=$'\t' read -r path name; do
            if [[ -d "$path" ]]; then
              mv "$path" "failed-artifacts/$name"
            fi
          done <<<"$keep"
          if [[ -n "$(ls -A failed-artifacts)" ]]; then
            rm -rf artifacts/_artifacts
            mv failed-artifacts artifacts/_artifacts
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-artifacts-${{ matrix.id }}
          path: artifacts
          retention-days: 7
