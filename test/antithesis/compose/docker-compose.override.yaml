x-vitess-build: &vitess-build
  build:
    context: ../../..
    dockerfile: test/antithesis/compose/Dockerfile.vitess-instrumented

x-vttablet-override: &vttablet-override
  <<: *vitess-build
  ports:
    - "15999"
    - "3306"

services:
  antithesis-client:
    build:
      context: ./antithesis-client
      dockerfile: Dockerfile
    # for quick local development
    # volumes:
    #   - ./antithesis-client/crud:/opt/antithesis/test/v1/crud
    #   - ./antithesis-client/bank-test:/opt/antithesis/test/v1/bank-test
    #   - ./antithesis-client/helper.py:/opt/antithesis/resources/helper.py

  source_db_host:
    build:
      context: ./source_db/mysql
      dockerfile: Dockerfile
    ports:
      - "3306"

  vtorc:
    <<: *vitess-build

  vtctld:
    <<: *vitess-build
    ports:
      - "15999"

  vtgate:
    ports:
      - "15999"

  vttablet101:
    <<: *vttablet-override

  vttablet102:
    <<: *vttablet-override

  vttablet104:
    <<: *vttablet-override

  vttablet201:
    <<: *vttablet-override

  vttablet202:
    <<: *vttablet-override

  vttablet204:
    <<: *vttablet-override

  vttablet301:
    <<: *vttablet-override

  vttablet302:
    <<: *vttablet-override

  vttablet304:
    <<: *vttablet-override
