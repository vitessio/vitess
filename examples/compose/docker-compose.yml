services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    platform: linux/amd64
    command:
      - etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    ports:
      - "2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 30

  vtctld:
    build:
      context: ../..
      dockerfile: docker/lite/Dockerfile
    platform: linux/amd64
    command: ["/vt/scripts/vtctld-up.sh"]
    environment:
      - CELL=${CELL}
      - TOPOLOGY_FLAGS=${TOPOLOGY_FLAGS}
    ports:
      - "15000:15000"
      - "15999:15999"
    volumes:
      - ./scripts:/vt/scripts:ro
    depends_on:
      etcd:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15000/debug/status"]
      interval: 5s
      timeout: 3s
      retries: 30

  vtgate:
    build:
      context: ../..
      dockerfile: docker/lite/Dockerfile
    platform: linux/amd64
    command: ["/vt/scripts/vtgate-up.sh"]
    environment:
      - CELL=${CELL}
      - TOPOLOGY_FLAGS=${TOPOLOGY_FLAGS}
    ports:
      - "15001:15001"
      - "15306:15306"
      - "15991:15991"
    volumes:
      - ./scripts:/vt/scripts:ro
    depends_on:
      vtctld:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:15001/debug/status"]
      interval: 5s
      timeout: 3s
      retries: 30

  vtorc:
    build:
      context: ../..
      dockerfile: docker/lite/Dockerfile
    platform: linux/amd64
    command: ["/vt/scripts/vtorc-up.sh"]
    environment:
      - CELL=${CELL}
      - TOPOLOGY_FLAGS=${TOPOLOGY_FLAGS}
    ports:
      - "16000:16000"
    volumes:
      - ./scripts:/vt/scripts:ro
      - ../common/vtorc:/vt/config/vtorc:ro
    depends_on:
      vtctld:
        condition: service_healthy

  vtadmin:
    build:
      context: ../..
      dockerfile: docker/lite/Dockerfile
    platform: linux/amd64
    command: ["/vt/scripts/vtadmin-up.sh"]
    ports:
      - "14200:14200"
    volumes:
      - ./scripts:/vt/scripts:ro
      - ./vtadmin:/vt/config/vtadmin:ro
      - vtadmin-web-build:/vt/web/vtadmin/build
    depends_on:
      vtctld:
        condition: service_healthy

  vtadmin-web:
    image: nginx:alpine
    platform: linux/amd64
    ports:
      - "14201:80"
    volumes:
      - vtadmin-web-build:/usr/share/nginx/html:ro
    depends_on:
      - vtadmin

  # Commerce keyspace tablets (profile: commerce)
  vttablet100:
    build:
      context: ../..
      dockerfile: docker/lite/Dockerfile
    platform: linux/amd64
    command: ["/vt/scripts/vttablet-up.sh"]
    profiles: [commerce]
    environment:
      - CELL=${CELL}
      - TOPOLOGY_FLAGS=${TOPOLOGY_FLAGS}
      - TABLET_UID=100
