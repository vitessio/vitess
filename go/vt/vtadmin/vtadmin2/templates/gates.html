{{ define "gates.html" }}
{{ template "layout" . }}
{{ end }}

{{ define "content" }}
<div class="toolbar">
  <h1>VTGates</h1>
  <input class="table-filter" data-table-filter="#gates-table" placeholder="Filter VTGates" aria-label="Filter VTGates">
</div>
<div class="card">
  <table id="gates-table">
    <thead>
      <tr><th>Cluster</th><th>Hostname</th><th>Cell</th><th>Pool</th><th>FQDN</th></tr>
    </thead>
    <tbody>
      {{ range .Data }}
      <tr>
        <td>{{ clusterID .GetCluster }}</td>
        <td>{{ .GetHostname }}</td>
        <td>{{ .GetCell }}</td>
        <td>{{ .GetPool }}</td>
        <td>{{ .GetFQDN }}</td>
      </tr>
      {{ else }}
      <tr><td colspan="5">No VTGates found.</td></tr>
      {{ end }}
    </tbody>
  </table>
</div>
{{ end }}
