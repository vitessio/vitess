{{ define "vtexplain.html" }}
{{ template "layout" . }}
{{ end }}

{{ define "content" }}
<div class="toolbar">
  <h1>VTExplain</h1>
</div>
<div class="card">
  <form method="get" action="/vtexplain" class="form-grid">
    <label>Cluster <input name="cluster_id" value="{{ .Data.Cluster }}"></label>
    <label>Keyspace <input name="keyspace" value="{{ .Data.Keyspace }}"></label>
    <label>SQL <textarea name="sql">{{ .Data.SQL }}</textarea></label>
    <button type="submit">Run VTExplain</button>
  </form>
</div>
{{ if .Data.Response }}
<div class="card">
  <h2>Result</h2>
  <pre>{{ .Data.Response.GetResponse }}</pre>
  <pre>{{ protoJSON .Data.Response }}</pre>
</div>
{{ end }}
{{ end }}
