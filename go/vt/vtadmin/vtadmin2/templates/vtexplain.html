{{ define "vtexplain.html" }}
{{ template "layout" . }}
{{ end }}

{{ define "content" }}
<div class="toolbar">
  <h1>VTExplain</h1>
</div>
<div class="card">
  <form method="get" action="/vtexplain" class="form-grid">
    <label>
      Cluster
      <select name="cluster_id" required>
        {{ range .Data.Form.Clusters }}
        <option value="{{ .GetId }}"{{ if eq .GetId $.Data.Form.SelectedCluster }} selected{{ end }}>{{ .GetName }} ({{ .GetId }})</option>
        {{ end }}
      </select>
    </label>
    <label>
      Keyspace
      <select name="keyspace" required>
        {{ range .Data.Form.Keyspaces }}
        {{ if eq (clusterID .GetCluster) $.Data.Form.SelectedCluster }}
        <option value="{{ keyspaceName . }}"{{ if eq (keyspaceName .) $.Data.Form.SelectedKeyspace }} selected{{ end }}>{{ keyspaceName . }}</option>
        {{ end }}
        {{ end }}
      </select>
    </label>
    <label>SQL <textarea name="sql">{{ .Data.SQL }}</textarea></label>
    <button type="submit">Run VTExplain</button>
  </form>
</div>
{{ if .Data.Response }}
<div class="card">
  <h2>Result</h2>
  <pre>{{ .Data.Response.GetResponse }}</pre>
  <pre>{{ protoJSON .Data.Response }}</pre>
</div>
{{ end }}
{{ end }}
